trigger: none

pool:
  name: App_Pool

stages:
- stage: tf_install
  jobs:
  - job: Tf
    displayName: terraform install ho rha hai
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
        backendServiceArm: 'App_SC'
        backendAzureRmStorageAccountName: 'tfstgankit'
        backendAzureRmContainerName: 'pipetest'
        backendAzureRmKey: 'my.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'App_SC'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'App_SC'